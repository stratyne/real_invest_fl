services:

  db:
    image: postgis/postgis:16-3.4
    container_name: real_invest_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: penstock
      POSTGRES_PASSWORD: penstock
      POSTGRES_DB: real_invest_fl
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penstock -d real_invest_fl"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: real_invest_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: real_invest_app
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets
      - ./config:/app/config
    command: uvicorn real_invest_fl.api.main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: real_invest_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets
      - ./config:/app/config
    command: celery -A real_invest_fl.tasks.celery_app worker --loglevel=info --concurrency=4

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: real_invest_frontend
    volumes:
      - frontend_dist:/dist
    # This container exits immediately after the build stage copies files.
    # That is correct and expected — it is a one-shot build artifact exporter.
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    container_name: real_invest_nginx
    restart: unless-stopped
    depends_on:
      - app
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: real_invest_cloudflared
    restart: unless-stopped
    depends_on:
      - nginx
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  postgres_data:
  redis_data:
  frontend_dist:
